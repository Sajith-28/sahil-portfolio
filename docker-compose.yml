version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/sahil_portfolio
      - MAIL_USERNAME=sahilkutty92@gmail.com
      - MAIL_PASSWORD=your_16_character_app_password_here
      - MAIL_FROM=sahilkutty92@gmail.com
      - MAIL_SERVER=smtp.gmail.com
      - MAIL_PORT=587
    depends_on:
      - mongodb
    restart: always

  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

volumes:
  mongodb_data:
